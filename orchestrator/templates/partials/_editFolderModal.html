<div class="modal fade" id="editFolderModal" tabindex="-1" aria-labelledby="editFolderModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fs-6 fw-bold text-dark" id="editFolderModalLabel">Modify Folder Registry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="{% url 'edit_folder' selected_folder.id %}" method="POST">
                {% csrf_token %}
                <div class="modal-body py-4">
                    <div class="mb-3">
                        <label for="name" class="form-label text-muted fs-7 text-uppercase fw-semibold">Folder Friendly Name</label>
                        <input type="text" class="form-control form-control-light-sm" name="name" value="{{ selected_folder.name }}" required>
                    </div>
                    <div class="mb-0">
                        <label for="physical_path" class="form-label text-muted fs-7 text-uppercase fw-semibold">Physical Storage Directory Path</label>
                        <input type="text" class="form-control form-control-light-sm" name="physical_path" value="{{ selected_folder.physical_path }}" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary-dark px-3" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-primary-uipath px-3 py-1.5">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
