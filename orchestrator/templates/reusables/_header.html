{% load static %}
<link rel="stylesheet" href="{% static 'styles/_header.css' %}">
<header class="orchestrator-top-navbar d-flex align-items-center justify-content-between px-4">
    <!-- Brand Info -->
    <div class="d-flex align-items-center">
        <button class="btn btn-link text-secondary p-0 me-3 d-flex align-items-center" type="button" aria-label="Menu"
            style="line-height: 1;">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path
                    d="M2 2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-3zM2 10.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-3zm8-8a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-3zm0 8a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-3z" />
            </svg>
        </button>
        <span class="brand-text text-dark fw-bold fs-6">PTY <span
                class="fw-normal text-secondary opacity-75">Orchestrator</span></span>
    </div>

    <!-- Right Header Elements -->
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-link text-secondary p-0 position-relative" type="button" aria-label="Notifications">
            <span style="font-size: 1.1rem;">🔔</span>
        </button>
        <button class="btn btn-link text-secondary p-0" type="button" aria-label="Help">
            <span style="font-size: 1.1rem;">❓</span>
        </button>
        <div class="user-avatar-light d-flex align-items-center justify-content-center fw-semibold text-white rounded-circle bg-primary"
            style="width: 32px; height: 32px; font-size: 0.8rem; background-color: var(--uipath-blue) !important;">
            {% if request.session.username %}{{ request.session.username|slice:":2"|upper }}{% else %}KD{% endif %}
        </div>
    </div>
</header>
